<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damian van Loon | In Onderhoud</title>
    <meta name="description" content="Website van Damian van Loon is momenteel in onderhoud.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-base: #0c0d12;
            --bg-card: #11213D;
            --border-color: #26354d;
            --border-hover: #808080;
            --text-primary: #fafafa;
            --text-secondary: #d1d5db;
            --accent-blue: #BEA36B;
            --accent-blue-dark: #a88c52;
            --font-sans: 'Geist', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .maintenance-container {
            max-width: 500px;
            width: 100%;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--accent-blue);
            /* Solid Gold: #BEA36B */
            color: var(--bg-card);
            /* Deep Navy #11213D */
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            border: 1px solid var(--accent-blue-dark);
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--bg-card);
            /* Navy dot for high contrast */
            border-radius: 50%;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 1.5rem 0;
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.6rem 1rem;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--accent-blue);
            /* Gold: #BEA36B */
            color: var(--bg-card);
            /* Navy: #11213D */
        }

        .btn-primary:hover {
            background-color: var(--accent-blue-dark);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border-color: var(--border-hover);
            /* Gray: #808080 */
        }

        .btn-secondary:hover {
            background-color: var(--bg-base);
            border-color: var(--text-primary);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--border-hover);
            /* Gray: #808080 */
            font-family: var(--font-mono);
        }

        /* --- Dynamic Ambient Background CSS Variables & Styles --- */
        :root {
            --bg-path-color: rgba(38, 53, 77, 0.15);
            --bg-packet-color: rgba(190, 163, 107, 0.35);
            --bg-glow-color: rgba(190, 163, 107, 0.12);
        }

        .time-morning {
            --bg-path-color: rgba(190, 163, 107, 0.15);
            --bg-packet-color: rgba(190, 163, 107, 0.4);
            --bg-glow-color: rgba(190, 163, 107, 0.18);
        }

        .time-afternoon {
            --bg-path-color: rgba(24, 99, 246, 0.15);
            --bg-packet-color: rgba(24, 99, 246, 0.4);
            --bg-glow-color: rgba(24, 99, 246, 0.18);
        }

        .time-evening {
            --bg-path-color: rgba(190, 163, 107, 0.18);
            --bg-packet-color: rgba(190, 163, 107, 0.45);
            --bg-glow-color: rgba(190, 163, 107, 0.22);
        }

        .time-night {
            --bg-path-color: rgba(38, 53, 77, 0.2);
            --bg-packet-color: rgba(24, 99, 246, 0.3);
            --bg-glow-color: rgba(24, 99, 246, 0.12);
        }

        #ambient-bg-svg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -2;
        }

        #ambient-orbit-path {
            transition: stroke 1.5s ease-in-out;
        }

        .ambient-packet {
            transition: fill 1.5s ease-in-out;
        }

        #ambient-master-node circle {
            transition: fill 1.5s ease-in-out, stroke 1.5s ease-in-out;
        }

        #ambient-node-label {
            transition: fill 1.5s ease-in-out;
            letter-spacing: 0.05em;
            user-select: none;
            opacity: 0.85;
        }
    </style>
    <script src="bg-dynamic.js" defer></script>
</head>

<body>

    <div class="maintenance-container">
        <div class="status-badge">
            <span class="status-dot"></span>
            <span>Onderhoudsmodus</span>
        </div>
        <h1>Damian van Loon</h1>
        <p class="subtitle">
            Deze website is tijdelijk onbeschikbaar. Voor dringende
            vragen kun je direct contact opnemen via onderstaande knoppen.
        </p>

        <div class="divider"></div>

        <div class="contact-links">
            <a href="https://www.linkedin.com/in/damian-van-loon-9070428a/" target="_blank" rel="noopener"
                class="btn btn-primary">
                Zie LinkedIn
            </a>
            <a href="mailto:damianloon@gmail.com" class="btn btn-secondary">
                Stuur een E-mail
            </a>
        </div>

        <div class="footer-note">
            Damian van Loon
        </div>
    </div>

</body>

</html>
