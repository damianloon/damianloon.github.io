<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damian van Loon | In Onderhoud</title>
    <meta name="description" content="Website van Damian van Loon is momenteel in onderhoud.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #09090b;
            --bg-card: #18181b;
            --border-color: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --accent-blue: #3b82f6;
            --font-sans: 'Geist', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .maintenance-container {
            max-width: 500px;
            width: 100%;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: #1e1b4b;
            color: #a5b4fc;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            border: 1px solid #312e81;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #6366f1;
            border-radius: 50%;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 1.5rem 0;
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.6rem 1rem;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--text-primary);
            color: var(--bg-base);
        }

        .btn-primary:hover {
            background-color: #e4e4e7;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--bg-base);
            border-color: #3f3f46;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #52525b;
            font-family: var(--font-mono);
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="status-badge">
            <span class="status-dot"></span>
            <span>Onderhoudsmodus</span>
        </div>
        <h1>Damian van Loon</h1>
        <p class="subtitle">
            Deze website wordt momenteel bijgewerkt met de nieuwste homelab-infrastructuur en projecten. Voor dringende vragen of samenwerkingen kun je direct contact opnemen.
        </p>

        <div class="divider"></div>

        <div class="contact-links">
            <a href="https://www.linkedin.com/in/damian-van-loon-9070428a/" target="_blank" rel="noopener" class="btn btn-primary">
                Connect op LinkedIn
            </a>
            <a href="mailto:damianloon@gmail.com" class="btn btn-secondary">
                Stuur een E-mail
            </a>
        </div>

        <div class="footer-note">
            damianloon.github.io
        </div>
    </div>

</body>
</html>
